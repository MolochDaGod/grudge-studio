  <body>
    <div id="root"></div>
    <script>
      // Suppress browser extension errors (MetaMask, etc.) before any other scripts load
      window.addEventListener('unhandledrejection', function(e) {
        if (e.reason && (
          (e.reason.message && e.reason.message.includes('MetaMask')) ||
          (e.reason.stack && e.reason.stack.includes('chrome-extension://'))
        )) {
          e.preventDefault();
          e.stopImmediatePropagation();
          return false;
        }
      }, true);
      window.addEventListener('error', function(e) {
        if (e.message && e.message.includes('MetaMask')) {
          e.preventDefault();
          e.stopImmediatePropagation();
          return false;
        }
      }, true);
    </script>
