version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: grudge-postgres
    environment:
      POSTGRES_DB: grudge_warlords
      POSTGRES_USER: grudge
      POSTGRES_PASSWORD: changeme_in_production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grudge"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - grudge-network

  redis:
    image: redis:7-alpine
    container_name: grudge-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - grudge-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: grudge-app
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://neondb_owner:npg_81flEhFcTOwn@ep-small-sun-afafboxi.c-2.us-west-2.aws.neon.tech/neondb?sslmode=require
      SESSION_SECRET: dev_secret_change_in_production_use_crypto_random_string
      REDIS_URL: redis://redis:6379
      BACKEND_URL: http://localhost:5000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - grudge-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  grudge-network:
    driver: bridge
