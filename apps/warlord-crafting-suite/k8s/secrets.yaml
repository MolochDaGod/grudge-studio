apiVersion: v1
kind: Secret
metadata:
  name: grudge-secrets
  namespace: grudge-warlords
type: Opaque
stringData:
  # IMPORTANT: Change these values before deploying!
  # Generate SESSION_SECRET with: node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"
  
  DATABASE_URL: "postgresql://grudge_prod:CHANGE_THIS_PASSWORD@postgres-service:5432/grudge_warlords_prod"
  SESSION_SECRET: "GENERATE_STRONG_SECRET_HERE_USE_CRYPTO_RANDOM_BYTES"
  REDIS_URL: "redis://redis-service:6379"
  POSTGRES_PASSWORD: "CHANGE_THIS_STRONG_PASSWORD"

