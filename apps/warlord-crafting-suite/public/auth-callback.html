<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signing you in... · Grudge Warlords</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      color: #e2e0ff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      gap: 1.5rem;
    }
    .logo { font-size: 2rem; font-weight: 800; letter-spacing: -1px; }
    .logo span { color: #f59e0b; }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid rgba(245,158,11,.15);
      border-top-color: #f59e0b;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .msg { font-size: 1rem; opacity: .7; }
    .error-box {
      display: none;
      background: rgba(255,50,50,.1);
      border: 1px solid rgba(255,80,80,.3);
      border-radius: 8px;
      padding: 1rem 1.5rem;
      max-width: 380px;
      text-align: center;
      gap: .75rem;
      flex-direction: column;
    }
    .error-box.visible { display: flex; }
    .error-box p { color: #ff8080; font-size: .9rem; }
    .btn {
      display: inline-block;
      padding: .5rem 1.25rem;
      border-radius: 6px;
      background: #f59e0b;
      color: #0a0a0f;
      font-weight: 700;
      text-decoration: none;
      font-size: .875rem;
      cursor: pointer;
      border: none;
    }
    .btn.ghost { background: transparent; color: #e2e0ff; border: 1px solid rgba(255,255,255,.2); }
    .btns { display: flex; gap: .75rem; justify-content: center; }
  </style>
</head>
<body>
  <div class="logo">GRUDGE <span>Warlords</span></div>
  <div class="spinner" id="spinner"></div>
  <p class="msg" id="msg">Completing sign-in&hellip;</p>

  <div class="error-box" id="errorBox">
    <p id="errorMsg">Authentication failed. Please try again.</p>
    <div class="btns">
      <a href="/" class="btn ghost">Home</a>
      <button class="btn" onclick="retry()">Retry</button>
    </div>
  </div>

  <script>
    (function () {
      var params   = new URLSearchParams(window.location.search);
      var token    = params.get('grudge_token');
      var next     = params.get('next') || params.get('redirect') || '';
      var provider = params.get('auth') || 'oauth';

      // Prefer sessionStorage-saved next (set before OAuth redirect)
      if (!next) {
        try { next = sessionStorage.getItem('gw_auth_next') || '/'; } catch(e) { next = '/'; }
      }

      // Safety: only allow same-origin redirects
      if (next && (next.startsWith('http://') || next.startsWith('https://'))) {
        try {
          var u = new URL(next);
          if (u.hostname !== window.location.hostname) next = '/';
        } catch (e) { next = '/'; }
      }
      if (!next) next = '/';

      function showError(msg) {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('msg').style.display = 'none';
        document.getElementById('errorMsg').textContent = msg || 'Authentication failed. Please try again.';
        document.getElementById('errorBox').classList.add('visible');
      }

      function retry() { window.location.href = '/login'; }
      window.retry = retry;

      if (!token) {
        showError('No auth token received. Please try logging in again.');
        return;
      }

      document.getElementById('msg').textContent = 'Verifying credentials\u2026';

      fetch('/api/auth/exchange', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ token: token }),
      })
      .then(function (r) {
        if (!r.ok) return r.json().then(function (d) { throw new Error(d.error || 'Exchange failed'); });
        return r.json();
      })
      .then(function (player) {
        // Map The-ENGINE role names to the roles AuthContext expects
        var roleMap = { player: 'user', guest: 'guest', admin: 'admin' };
        var role = roleMap[player.role] || 'user';

        // Build the AuthUser shape that AuthContext reads from localStorage
        var authUser = {
          id: player.grudgeId || String(player.id || ''),
          username: player.username || '',
          displayName: player.displayName || player.username || '',
          email: player.email || undefined,
          role: role,
          isPuterUser: false,
          createdAt: new Date().toISOString(),
          lastLogin: new Date().toISOString(),
        };

        try { localStorage.setItem('grudge_auth_user', JSON.stringify(authUser)); } catch (e) {}
        // Also keep raw grudge_player for other consumers
        try { localStorage.setItem('grudge_player', JSON.stringify(player)); } catch (e) {}
        try { sessionStorage.removeItem('gw_auth_next'); } catch (e) {}

        document.getElementById('msg').textContent =
          'Welcome back, ' + (player.displayName || player.username) + '!';

        // Short delay so the user sees the welcome flash
        setTimeout(function () { window.location.replace(next); }, 700);
      })
      .catch(function (err) {
        showError(err.message || 'Authentication failed. Please try again.');
      });
    })();
  </script>
</body>
</html>
