<html lang="en">
<head>

  <meta property="og:title" content="GRUDGE Warlords - Apps">

  <meta property="og:type" content="website">

  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3Eâš”ï¸%3C/text%3E%3C/svg%3E">

  <title>GRUDGE Warlords - Apps</title>
  <script src="https://js.puter.com/v2/"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap');
    .font-heading { font-family: 'Cinzel', serif; }
    .app-card {
      transition: all 0.3s ease;
    }
    .app-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 40px -10px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body class="min-h-screen relative overflow-x-hidden">
  <div class="fixed inset-0 bg-cover bg-center bg-no-repeat" style="background-image: url('./login-bg.png'); background-color: #0f172a;"></div>
  <div class="fixed inset-0 bg-black/50"></div>
  <div class="fixed inset-0" style="background: radial-gradient(ellipse at center, rgba(234,179,8,0.15) 0%, transparent 60%);"></div>
  
  <div id="app" class="relative z-10 min-h-screen">
    <div class="flex items-center justify-center min-h-screen">
      <div class="animate-spin w-12 h-12 border-4 border-amber-500 border-t-transparent rounded-full"></div>
    </div>
  </div>

  <script type="module">
    const APP_CONFIG = {
      SESSION_PREFIX: 'grudge_session_',
      AUTH_URL: 'https://grudge-auth-73v97.puter.site',
      
      APPS: [
        {
          id: 'crafting',
          name: 'GRUDGE Crafting',
          description: 'Full crafting system with 518+ recipes, T0-T8 progression',
          url: 'https://api.grudge-studio.com',
          icon: 'âš’ï¸',
          color: 'from-amber-600 to-orange-600',
          features: ['518+ Recipes', 'T0-T8 Items', 'AFK Queue']
        },
        {
          id: 'warlords',
          name: 'Warlords Studio',
          description: 'Main game interface with character progression',
          url: 'https://grudge-crafting.puter.site',
          icon: 'âš”ï¸',
          color: 'from-red-600 to-rose-600',
          features: ['4 Classes', '5 Professions', 'Skill Trees']
        },
        {
          id: 'cloud',
          name: 'GRUDGE Cloud',
          description: 'Asset management and cloud storage admin',
          url: 'https://grudgecloud-85c9p.puter.site',
          icon: 'â˜ï¸',
          color: 'from-purple-600 to-indigo-600',
          features: ['Asset Upload', 'File Browser', 'Admin Tools'],
          requiresRole: ['admin', 'developer']
        },
        {
          id: 'nexus',
          name: 'GRUDGE Nexus',
          description: 'Platform hub for all GRUDGE services',
          url: 'https://grudgeplatform.puter.site',
          icon: 'ðŸŒ',
          color: 'from-blue-600 to-cyan-600',
          features: ['Service Hub', 'API Gateway', 'Sync']
        },
        {
          id: 'islands',
          name: 'Home Islands',
          description: 'RTS game mode with procedural island generation',
          url: 'https://islands-cu83xisb0g.puter.site',
          icon: 'ðŸï¸',
          color: 'from-green-600 to-emerald-600',
          features: ['Proc Gen', 'Resources', 'Building']
        },
        {
          id: 'launcher',
          name: 'GRUDGE Launcher',
          description: 'Quick launch portal for all apps',
          url: 'https://grudge-launcher-xu9q5.puter.site',
          icon: 'ðŸš€',
          color: 'from-pink-600 to-fuchsia-600',
          features: ['Quick Launch', 'Favorites', 'Recent']
        },
        {
          id: 'game-editor',
          name: 'Game Editor',
          description: 'Map editor and game engine tools',
          url: 'https://colorful-puppy-4769-zilvf.puter.site',
          icon: 'ðŸŽ®',
          color: 'from-yellow-600 to-lime-600',
          features: ['Map Editor', 'Terrain', 'Assets'],
          requiresRole: ['admin', 'developer']
        }
      ]
    };

    let currentSession = null;

    async function verifySession(code) {
      try {
        const data = await puter.kv.get(APP_CONFIG.SESSION_PREFIX + code);
        if (!data) return null;
        const session = JSON.parse(data);
        if (session.expiresAt < Date.now()) return null;
        return session;
      } catch (e) {
        return null;
      }
    }

    async function getSignedSsoToken() {
      if (!currentSession) return null;
      try {
        const response = await fetch('https://api.grudge-studio.com/api/auth/sso/token', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: currentSession.username,
            role: currentSession.role,
            puterUserId: currentSession.userId
          })
        });
        const data = await response.json();
        if (data.success && data.token) {
          currentSession.ssoToken = data.token;
          return data.token;
        }
        return null;
      } catch (e) {
        console.error('Failed to get SSO token:', e);
        return null;
      }
    }

    async function checkAuth() {
      const params = new URLSearchParams(window.location.search);
      const authCode = params.get('auth_code');
      const role = params.get('role');
      const username = params.get('username');
      
      if (authCode) {
        const session = await verifySession(authCode);
        if (session) {
          currentSession = { ...session, authCode };
          localStorage.setItem('grudge_apps_auth', authCode);
          
          const url = new URL(window.location.href);
          url.searchParams.delete('auth_code');
          url.searchParams.delete('role');
          url.searchParams.delete('username');
          window.history.replaceState({}, '', url.toString());
          
          await getSignedSsoToken();
          return true;
        }
      }
      
      const storedCode = localStorage.getItem('grudge_apps_auth');
      if (storedCode) {
        const session = await verifySession(storedCode);
        if (session) {
          currentSession = { ...session, authCode: storedCode };
          await getSignedSsoToken();
          return true;
        }
      }
      
      const isInPuter = params.has('puter.app_instance_id');
      if (isInPuter) {
        try {
          const user = await puter.auth.getUser();
          if (user) {
            currentSession = {
              userId: user.uuid,
              username: user.username,
              role: getUserRole(user.username),
              source: 'puter_direct'
            };
            await getSignedSsoToken();
            return true;
          }
        } catch (e) {
          console.log('Puter auth check failed');
        }
      }
      
      return false;
    }

    function getUserRole(username) {
      const lower = (username || '').toLowerCase();
      if (['admin', 'grudgewarlord', 'outapps', 'grudachain'].includes(lower)) return 'admin';
      if (['dev', 'developer'].includes(lower)) return 'developer';
      if (['premium'].includes(lower)) return 'premium';
      return 'user';
    }

    function canAccessApp(app) {
      if (!app.requiresRole) return true;
      if (!currentSession) return false;
      return app.requiresRole.includes(currentSession.role);
    }

    function getAppUrlSync(app) {
      if (!currentSession?.ssoToken) return app.url;
      const separator = app.url.includes('?') ? '&' : '?';
      return `${app.url}${separator}sso_token=${encodeURIComponent(currentSession.ssoToken)}`;
    }

    function getRoleBadge(role) {
      const badges = {
        admin: { label: 'Admin', color: 'bg-red-500' },
        developer: { label: 'Developer', color: 'bg-purple-500' },
        premium: { label: 'Premium', color: 'bg-amber-500' },
        user: { label: 'User', color: 'bg-green-500' },
        guest: { label: 'Guest', color: 'bg-slate-500' }
      };
      return badges[role] || badges.user;
    }

    function renderApps() {
      const badge = getRoleBadge(currentSession?.role || 'guest');
      const visibleApps = APP_CONFIG.APPS.filter(app => canAccessApp(app));
      const lockedApps = APP_CONFIG.APPS.filter(app => !canAccessApp(app));

      const appCards = visibleApps.map(app => `
        <a href="${getAppUrlSync(app)}" 
           class="app-card block bg-gradient-to-br ${app.color} p-1 rounded-2xl shadow-lg">
          <div class="bg-slate-900/90 backdrop-blur-sm rounded-xl p-6 h-full">
            <div class="flex items-start justify-between mb-4">
              <span class="text-4xl">${app.icon}</span>
              <div class="flex gap-1 flex-wrap justify-end">
                ${app.features.map(f => `
                  <span class="text-[10px] px-2 py-0.5 bg-slate-700/50 text-slate-300 rounded-full">${f}</span>
                `).join('')}
              </div>
            </div>
            <h3 class="font-heading text-lg text-white mb-2">${app.name}</h3>
            <p class="text-sm text-slate-400">${app.description}</p>
          </div>
        </a>
      `).join('');

      const lockedCards = lockedApps.map(app => `
        <div class="app-card block bg-slate-700/30 p-1 rounded-2xl opacity-50 cursor-not-allowed">
          <div class="bg-slate-900/90 backdrop-blur-sm rounded-xl p-6 h-full relative">
            <div class="absolute inset-0 flex items-center justify-center bg-slate-900/60 rounded-xl">
              <span class="text-2xl">ðŸ”’</span>
            </div>
            <div class="flex items-start justify-between mb-4">
              <span class="text-4xl grayscale">${app.icon}</span>
            </div>
            <h3 class="font-heading text-lg text-slate-500 mb-2">${app.name}</h3>
            <p class="text-sm text-slate-600">Requires ${app.requiresRole?.join(' or ')} access</p>
          </div>
        </div>
      `).join('');

      document.getElementById('app').innerHTML = `
        <div class="container mx-auto px-4 py-8 max-w-6xl">
          <header class="text-center mb-12">
            <img src="./grudge-logo.png" alt="GRUDGE" class="w-24 h-24 mx-auto mb-4 drop-shadow-2xl">
            <h1 class="font-heading text-4xl bg-gradient-to-r from-amber-300 via-amber-400 to-orange-500 bg-clip-text text-transparent mb-2">
              GRUDGE Warlords
            </h1>
            <p class="text-slate-400 mb-4">Your Apps Portal</p>
            
            <div class="inline-flex items-center gap-3 bg-slate-800/60 backdrop-blur-sm px-6 py-3 rounded-full border border-slate-700">
              <span class="text-white font-medium">${currentSession?.username || 'Guest'}</span>
              <span class="${badge.color} text-white text-xs px-2 py-0.5 rounded-full">${badge.label}</span>
              ${currentSession ? `
                <button id="logout-btn" class="text-slate-400 hover:text-red-400 transition-colors ml-2">
                  <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                    <polyline points="16,17 21,12 16,7"/>
                    <line x1="21" y1="12" x2="9" y2="12"/>
                  </svg>
                </button>
              ` : ''}
            </div>
          </header>

          <section class="mb-12">
            <h2 class="font-heading text-xl text-amber-400 mb-6 flex items-center gap-2">
              <span>ðŸ“±</span> Your Apps
              <span class="text-sm text-slate-500 font-normal">(${visibleApps.length} available)</span>
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
              ${appCards}
            </div>
          </section>

          ${lockedCards ? `
            <section>
              <h2 class="font-heading text-lg text-slate-500 mb-4 flex items-center gap-2">
                <span>ðŸ”’</span> Restricted Apps
              </h2>
              <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                ${lockedCards}
              </div>
            </section>
          ` : ''}

          <footer class="mt-16 text-center text-slate-500 text-sm">
            <p>GRUDGE Warlords &copy; 2026 | Crafting & Progression System</p>
          </footer>
        </div>
      `;

      document.getElementById('logout-btn')?.addEventListener('click', handleLogout);
    }

    function renderLogin() {
      document.getElementById('app').innerHTML = `
        <div class="min-h-screen flex items-center justify-center p-4">
          <div class="backdrop-blur-md p-8 rounded-2xl border border-amber-500/50 max-w-md text-center shadow-2xl"
               style="background: linear-gradient(to bottom, rgba(15,23,42,0.9), rgba(15,23,42,0.95));">
            <img src="./grudge-logo.png" alt="GRUDGE" class="w-28 h-28 mx-auto mb-4 drop-shadow-2xl">
            <h1 class="font-heading text-3xl bg-gradient-to-r from-amber-300 via-amber-400 to-orange-500 bg-clip-text text-transparent mb-2">
              GRUDGE Warlords
            </h1>
            <p class="text-slate-400 mb-6">Sign in to access your apps</p>
            
            <a href="${APP_CONFIG.AUTH_URL}?returnUrl=${encodeURIComponent(window.location.origin + window.location.pathname)}" 
               class="block w-full py-4 px-6 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold rounded-xl transition-all transform hover:scale-105 shadow-lg">
              <span class="flex items-center justify-center gap-3">
                <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                </svg>
                Sign in with Puter
              </span>
            </a>
            
            <p class="text-xs text-slate-500 mt-6">
              Secure authentication via GRUDGE Auth
            </p>
          </div>
        </div>
      `;
    }

    async function handleLogout() {
      localStorage.removeItem('grudge_apps_auth');
      if (currentSession?.authCode) {
        try {
          await puter.kv.del(APP_CONFIG.SESSION_PREFIX + currentSession.authCode);
        } catch (e) {}
      }
      currentSession = null;
      renderLogin();
    }

    async function init() {
      const isAuthenticated = await checkAuth();
      if (isAuthenticated) {
        renderApps();
      } else {
        renderLogin();
      }
    }

    init();
  </script>
</body>
</html>
