version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: grudge-studio-db
    environment:
      POSTGRES_USER: grudge_user
      POSTGRES_PASSWORD: grudge_password
      POSTGRES_DB: grudge_studio
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U grudge_user -d grudge_studio']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: grudge-studio-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://grudge_user:grudge_password@postgres:5432/grudge_studio
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
    ports:
      - '5000:5000'
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:5000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
    driver: local
