app = "grudge-studio"
primary_region = "sea"

[build]
builder = "nixpacks"
buildCommand = "pnpm install && pnpm build"

[deploy]
startCommand = "node apps/warlord-crafting-suite/dist/index.cjs"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
processes = ["web"]

# NOTE: PostgreSQL service removed — all data lives in the Grudge Studio
# VPS backend (MySQL 8 via grudge-studio-backend).
# Frontend apps call api.grudge-studio.com and id.grudge-studio.com.

[env]
GRUDGE_AUTH_URL = {
  description = "Grudge ID auth backend URL",
  example = "https://id.grudge-studio.com"
}
GRUDGE_API_URL = {
  description = "Grudge Game API backend URL",
  example = "https://api.grudge-studio.com"
}
NODE_ENV = "production"
SESSION_SECRET = {
  description = "Secret key for sessions",
  example = "change-me"
}
ADMIN_PASSWORD = {
  description = "Admin authentication password",
  example = "change-me"
}

[deploy.triggers.image_incoming_webhook]
