app = "grudge-studio"
primary_region = "sea"

[build]
builder = "nixpacks"
buildCommand = "pnpm install && pnpm build"

[deploy]
startCommand = "node apps/warlord-crafting-suite/dist/index.cjs"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
processes = ["web"]

[[services]]
name = "db"
protocol = "postgres"
plan = "starter"

[env]
DATABASE_URL = {
  description = "PostgreSQL connection string",
  example = "postgresql://user:pass@host/db"
}
NODE_ENV = "production"
SESSION_SECRET = {
  description = "Secret key for sessions",
  example = "change-me"
}
ADMIN_PASSWORD = {
  description = "Admin authentication password",
  example = "change-me"
}

[deploy.triggers.image_incoming_webhook]
